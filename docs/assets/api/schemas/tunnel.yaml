TunnelOption:
  description: "The extra options for Tunnel ingress"
  type: object
  properties:
    destinations:
      description: "Destination endpoints"
      type: array
      items:
        $ref: "./endpoint.yaml#/Endpoint"
      minItems: 1
    balance:
      description: "Tunnel balance type"
      type: string
      enum:
        - random
        - round-robin
        - least-conn
  required:
    - destinations
    - balance
TunnelIngress:
  title: Tunnel
  description: "Tunnel ingress object"
  type: object
  properties:
    type:
      type: string
      enum:
        - tunnel
    option:
      $ref: "#/TunnelOption"
  required:
    - type
    - option
